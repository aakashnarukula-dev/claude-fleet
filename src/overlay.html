<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
<style>
  /* matches the in-app perm queue language from grid.html (--accent / --line / --muted / permcard styles) */
  :root { --bg:#141518; --line:#262931; --fg:#ffffff; --muted:#9aa0aa; --accent:#ff8a5c; }
  html,body { margin:0; height:100%; background:transparent; overflow:hidden; font:13px -apple-system, system-ui, sans-serif; -webkit-user-select:none; color:var(--fg); }
  /* the window itself is transparent — this is the floating TRANSLUCENT (frosted-glass) panel */
  #panel { position:fixed; inset:8px; display:none; flex-direction:column;
           background:rgba(18,20,24,.55); -webkit-backdrop-filter:blur(24px) saturate(165%); backdrop-filter:blur(24px) saturate(165%);
           border:1px solid rgba(255,255,255,.12); border-radius:14px; box-shadow:0 18px 50px rgba(0,0,0,.45); overflow:hidden; }
  #panel.show { display:flex; }
  #hdr { -webkit-app-region:drag; flex:0 0 auto; padding:11px 14px 9px; font-size:11px; font-weight:700; color:var(--muted);
         text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:7px; }
  #hdr .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex:0 0 auto; }
  #list { flex:1 1 auto; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .permcard { background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.10); border-left:3px solid var(--accent); border-radius:10px; padding:11px 12px; }
  .permcard .pc-name { font-size:12px; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .permcard .pc-sub { font-size:11px; color:var(--muted); margin-top:2px; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .permcard .pc-btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; -webkit-app-region:no-drag; }
  .permcard .pc-btns button { -webkit-app-region:no-drag; padding:5px 11px; border-radius:7px; border:1px solid var(--line);
         background:transparent; color:var(--fg); font-size:11px; font-weight:600; cursor:pointer; }
  .permcard .pc-btns button:hover { border-color:#3a3e48; }
  .permcard .pc-btns button.pc-yes { background:var(--accent); color:#1a0f0a; border-color:var(--accent); }
</style>
</head>
<body>
<div id="panel"><div id="hdr"><span class="dot"></span><span id="hdrtxt"></span></div><div id="list"></div></div>
<script>
  // overlay renderer — the SINGLE permission surface (the in-app grid queue was removed). Main pushes the full
  // pending list across ALL sessions via onPermQueue; we answer by writing the option digit to the right pane through
  // the existing answerPane() path (no reinvented answer logic), and jump to a pane via focusPane().
  const panelEl = document.getElementById('panel');
  const listEl = document.getElementById('list');
  const hdrEl = document.getElementById('hdrtxt');
  let current = [];   // last list pushed by main (source of truth); answers drop optimistically until main confirms

  function render(list) {
    current = Array.isArray(list) ? list : [];
    const items = current;
    panelEl.classList.toggle('show', items.length > 0);
    if (!items.length) { listEl.innerHTML = ''; hdrEl.textContent = ''; return; }
    hdrEl.textContent = items.length === 1 ? '1 permission pending' : items.length + ' permissions pending';
    listEl.innerHTML = '';
    items.forEach((p) => {
      const card = document.createElement('div'); card.className = 'permcard';
      const name = document.createElement('div'); name.className = 'pc-name'; name.textContent = p.name || 'A pane';
      const sub = document.createElement('div'); sub.className = 'pc-sub'; sub.textContent = (p.title || '') + ' · click to open pane';
      name.onclick = sub.onclick = () => window.fleet.focusPane(p.sid, p.id);
      const btns = document.createElement('div'); btns.className = 'pc-btns';
      const o = p.options || {};
      const mk = (label, digit, cls) => {
        const b = document.createElement('button'); b.textContent = label; if (cls) b.className = cls;
        b.onclick = () => answer(p, digit); btns.appendChild(b);
      };
      if (o.yes != null) mk('Yes', o.yes, 'pc-yes');
      if (o.always != null) mk('Always', o.always);
      if (o.no != null) mk('No', o.no);
      if (o.yes == null && o.always == null && o.no == null) {
        const b = document.createElement('button'); b.textContent = 'Open pane';
        b.onclick = () => window.fleet.focusPane(p.sid, p.id); btns.appendChild(b);
      }
      card.appendChild(name); card.appendChild(sub); card.appendChild(btns);
      listEl.appendChild(card);
    });
  }

  function answer(p, digit) {
    window.fleet.answerPane(p.sid, p.id, digit);   // main writes the digit + Enter to that pane's pty (same as in-app queue)
    // optimistic local drop for snappiness; main also pushes a fresh queue on the resulting state change
    render(current.filter((x) => !(x.sid === p.sid && x.id === p.id)));
  }

  window.fleet.onPermQueue(render);
</script>
</body>
</html>
