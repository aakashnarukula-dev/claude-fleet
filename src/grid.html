<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="vendor/xterm.css" />
<style>
  :root { --bg:#141518; --bar:#1b1d21; --line:#262931; --fg:#ffffff; --muted:#9aa0aa; --accent:#ff8a5c; --tabbar:#0c0d10; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#000; overflow:hidden; font:13px -apple-system, system-ui, sans-serif; -webkit-user-select:none; color:var(--fg); }
  #tabbar { height:38px; -webkit-app-region:drag; background:var(--tabbar); display:flex; align-items:flex-end; padding:0 8px 0 80px; gap:4px; border-bottom:1px solid var(--line); }
  .tab { -webkit-app-region:no-drag; display:flex; align-items:center; gap:8px; height:30px; padding:0 10px 0 13px; border-radius:8px 8px 0 0;
    background:#16181c; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; max-width:200px; }
  .tab.active { color:#fff; }   /* background set inline to the session's mode color in activate() */
  .tab .pdot { display:none; width:7px; height:7px; border-radius:50%; flex:none; }
  .tab.st-idle .pdot { display:inline-block; background:#e0a86b; }
  .tab.st-failed .pdot { display:inline-block; background:#ff5c57; }
  .tab.st-permission .pdot { display:inline-block; background:var(--accent); animation:permpulse 1.2s ease-in-out infinite; }   /* most-urgent state across the tab's panes */
  .tab .x { width:16px; height:16px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--muted); }
  .tab.active .x { color:rgba(255,255,255,0.85); }
  .tab .x:hover { background:rgba(255,255,255,0.18); color:#fff; }
  .tab.dragging { opacity:.45; }   /* tab being torn off / reordered */
  /* drop-target: another window's tab bar lights up while a tab is dragged over it (re-dock target) */
  #tabbar.drop-target { box-shadow: inset 0 -3px 0 0 var(--accent); background:#13161b; }
  #newtab { -webkit-app-region:no-drag; width:28px; height:28px; border:none; border-radius:7px; background:transparent; color:var(--muted); font-size:18px; cursor:pointer; }
  #newtab:hover { background:#16181c; color:#fff; }
  #addgrid { -webkit-app-region:no-drag; display:none; align-self:center; height:28px; margin-left:6px; padding:0 12px; border:1px solid #3a2a20; border-radius:7px; background:#241712; color:var(--accent); font-size:12px; font-weight:700; cursor:pointer; }
  #addgrid:hover { background:#2e1c14; border-color:var(--accent); }
  #addgrid:disabled { opacity:.5; cursor:default; }
  /* lightweight name prompt (Electron disables window.prompt) */
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:60; display:none; align-items:center; justify-content:center; -webkit-app-region:no-drag; }
  #modal.show { display:flex; }
  #modalbox { width:340px; background:#16181c; border:1px solid var(--line); border-radius:12px; padding:18px; box-shadow:0 18px 50px rgba(0,0,0,.5); }
  #modaltitle { font-size:13px; font-weight:700; color:#fff; margin-bottom:12px; }
  #modalinput { width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line); background:#0c0d10; color:var(--fg); font-size:13px; outline:none; }
  #modalinput:focus { border-color:var(--accent); }
  #modalbtns { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
  #modalbtns button { padding:7px 14px; border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--fg); font-size:12px; font-weight:600; cursor:pointer; }
  #modalok { background:var(--accent); color:#1a0f0a; border-color:var(--accent); }
  #sessions { position:absolute; top:38px; left:0; right:0; bottom:0; }
  #sessions.pushed { left:250px; }   /* Files sidebar pushes the grid instead of overlaying it */
  #sessions.editing { left:var(--edsplit, 50%); }   /* editor sits between sidebar and terminals; terminals fill the right */
  #edsplit { position:absolute; top:38px; bottom:0; left:var(--edsplit, 50%); width:6px; margin-left:-3px; z-index:22; cursor:col-resize; display:none; }
  #edsplit.show { display:block; }
  #edsplit::before { content:''; position:absolute; left:2px; top:0; bottom:0; width:1px; background:var(--line); }
  #edsplit:hover::before { background:var(--accent); }
  .session { position:absolute; inset:0; display:none; }
  .session.active { display:block; }
  .grid { position:absolute; inset:0; display:flex; flex-direction:column; background:var(--line); }
  .row { display:flex; flex-direction:row; min-width:0; min-height:0; }
  .pane { display:flex; flex-direction:column; min-width:0; min-height:0; overflow:hidden; background:var(--bg); }
  .pbar { -webkit-app-region:no-drag; display:flex; align-items:center; gap:8px; padding:6px 8px 6px 12px; border-bottom:1px solid var(--line); font-size:12px; font-weight:600; flex:none; color:#fff; background:var(--bar); }
  .pbar .ptitle { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pbar.orchestrator .ptitle { color:#e8915f; }   /* role shown by TEXT colour now, not a filled bar */
  .pbar.worker .ptitle { color:#7aa2e3; }
  /* per-pane status dot: a dot means "wants your attention"; working = no dot (clean) */
  .pbar .pdot { display:none; width:8px; height:8px; border-radius:50%; flex:none; }
  .pbar.st-idle .pdot { display:block; background:#e0a86b; }                 /* amber: idle / ready for next instruction */
  .pbar.st-failed .pdot { display:block; background:#ff5c57; }               /* red: failed */
  .pbar.st-permission .pdot { display:block; background:var(--accent); animation:permpulse 1.2s ease-in-out infinite; }
  @keyframes permpulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  .pbar .pclose { flex:none; width:18px; height:18px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1; color:rgba(255,255,255,0.78); cursor:pointer; }
  .pbar .pclose:hover { background:rgba(255,255,255,0.22); color:#fff; }
  .term { flex:1; min-height:0; padding:6px 8px; overflow:hidden; }   /* clip the terminal when its pane shrinks (no reflow) */
  .xterm { height:100%; }
  /* dividers: thin line + a wider invisible hit area (::after). Vertical dividers live INSIDE a row, so each
     row resizes its own panes; horizontal dividers sit between rows. No divider spans the whole grid. */
  .vgutter, .hgutter { flex:none; position:relative; background:var(--line); z-index:6; }
  .vgutter { width:1px; cursor:col-resize; }
  .hgutter { height:1px; cursor:row-resize; }
  .vgutter::after { content:''; position:absolute; top:0; bottom:0; left:-4px; right:-4px; }
  .hgutter::after { content:''; position:absolute; left:0; right:0; top:-4px; bottom:-4px; }
  .vgutter:hover, .hgutter:hover { background:var(--accent); }
  /* file manager + editor */
  #filesbtn { -webkit-app-region:no-drag; width:32px; height:30px; margin-right:6px; padding:0; border:none; border-radius:7px; background:transparent; color:var(--muted); font-size:15px; cursor:pointer; align-self:center; }
  #filesbtn:hover, #filesbtn.on { background:#16181c; color:#fff; }
  #filepanel { position:absolute; top:38px; left:0; bottom:0; width:250px; background:#0c0d10; border-right:1px solid var(--line); z-index:20; display:none; flex-direction:column; }
  #filepanel.open { display:flex; }
  #filesbtn svg { display:block; margin:0 auto; }
  #rootsel { -webkit-app-region:no-drag; margin:8px 8px; padding:6px 8px; border-radius:7px; border:1px solid var(--line); background:#16181c; color:var(--fg); font-size:12px; }
  #filetree { flex:1; overflow:auto; padding:2px 6px 12px; font-size:12.5px; }
  #filesearch { -webkit-app-region:no-drag; -webkit-user-select:text; margin:0 8px 8px; padding:6px 9px; border-radius:7px; border:1px solid var(--line); background:#16181c; color:var(--fg); font-size:12px; outline:none; }
  #filesearch:focus { border-color:var(--accent); }
  #fileresults { display:none; flex:1; overflow:auto; padding:2px 6px 12px; }
  #fileresults.show { display:block; }
  #filepanel.searching #filetree { display:none; }
  .fres { padding:5px 7px; border-radius:5px; cursor:pointer; }
  .fres:hover { background:#16181c; }
  .fres .ff { color:var(--muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fres .fl { font-family:'SF Mono', Menlo, monospace; font-size:11.5px; white-space:pre; overflow:hidden; text-overflow:ellipsis; }
  .fres .lno { color:var(--muted); margin-right:7px; }
  .fres mark { background:rgba(255,138,92,0.35); color:#fff; border-radius:2px; }
  .fhint { color:var(--muted); padding:6px 8px; font-size:12px; }
  .fitem { display:flex; align-items:center; gap:5px; padding:3px 6px; border-radius:5px; cursor:pointer; color:var(--fg); white-space:nowrap; }
  .fitem:hover { background:#16181c; }
  .fitem.sel { background:#1f2937; }
  .fitem .tw { width:11px; color:var(--muted); flex:none; text-align:center; font-size:10px; }
  .fitem .ic { flex:none; opacity:.7; }
  .fchildren { margin-left:11px; }
  #editor { position:absolute; top:38px; left:250px; right:calc(100% - var(--edsplit, 50%)); bottom:0; z-index:19; background:var(--bg); display:none; flex-direction:column; }
  #editor.open { display:flex; }
  #edbar { display:flex; align-items:center; gap:8px; padding:6px 10px; background:var(--bar); border-bottom:1px solid var(--line); font-size:12px; flex:none; }
  #edpath { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--fg); font-weight:600; }
  #edbar button { -webkit-app-region:no-drag; padding:5px 12px; border:1px solid var(--line); border-radius:6px; background:var(--panel); color:var(--fg); font-size:12px; font-weight:600; cursor:pointer; }
  #edbar button:hover { border-color:#3a3e48; }
  #edsave { background:var(--accent); color:#1a0f0a; border-color:var(--accent); }
  #edsave:disabled { opacity:.45; }
  #monaco { flex:1; min-height:0; }
  /* in-app permission queue removed — permission prompts now surface only through the system-wide overlay window. */
</style>
</head>
<body>
<div id="tabbar"><button id="filesbtn" title="Browse + edit files"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button><div id="tabs" style="display:flex; align-items:flex-end; gap:4px;"></div><button id="newtab" title="New session">+</button><button id="addgrid" title="Add a worker pane to this grid session">+ Pane</button></div>
<div id="modal"><div id="modalbox"><div id="modaltitle"></div><input id="modalinput" autocomplete="off" spellcheck="false" /><div id="modalbtns"><button id="modalcancel">Cancel</button><button id="modalok">Add</button></div></div></div>
<div id="sessions"></div>
<div id="filepanel"><select id="rootsel"></select><input id="filesearch" type="text" placeholder="Search text in files…" autocomplete="off" spellcheck="false" /><div id="filetree"></div><div id="fileresults"></div></div>
<div id="editor"><div id="edbar"><span id="edpath"></span><button id="edsave" disabled>Save ⌘S</button><button id="edclose">✕</button></div><div id="monaco"></div></div>
<div id="edsplit"></div>
<script src="vendor/xterm.js"></script>
<script src="vendor/addon-fit.js"></script>
<script>
  // Monaco (VS Code editor), vendored under vendor/monaco/vs and asar-unpacked so its worker loads from disk
  (function () {
    const base = new URL('vendor/monaco/vs', location.href).href;
    self.MonacoEnvironment = { getWorkerUrl: function () {
      return URL.createObjectURL(new Blob(
        ["self.MonacoEnvironment={baseUrl:'" + base + "/'};importScripts('" + base + "/base/worker/workerMain.js');"],
        { type: 'text/javascript' }));
    } };
  })();
</script>
<script src="vendor/monaco/vs/loader.js"></script>
<script>
  const THEME = {
    background:'#141518', foreground:'#ffffff', cursor:'#ff8a5c', cursorAccent:'#141518', selectionBackground:'rgba(255,138,92,0.40)',
    black:'#000000', red:'#ff5c57', green:'#5af78e', yellow:'#f3f99d', blue:'#57c7ff', magenta:'#ff6ac1', cyan:'#9aedfe', white:'#f1f1f0',
    brightBlack:'#686868', brightRed:'#ff5c57', brightGreen:'#5af78e', brightYellow:'#f3f99d', brightBlue:'#57c7ff', brightMagenta:'#ff6ac1', brightCyan:'#9aedfe', brightWhite:'#ffffff',
  };
  const sessions = {};   // sid -> { title, color, gridEl, sessEl, tabEl, terms:{}, activePaneId }
  let activeSid = null;
  // Re-fitting a terminal to a NEW width reflows xterm's buffer, which mangles Claude's background-colored
  // output into grey/black "zebra" rows. So when the sidebar/editor/divider changes a pane's width, we DON'T
  // re-fit — the terminal keeps its columns and just clips (the clipped area is empty). Window resize still fits.
  let SUPPRESS_FIT = false;
  function withNoFit(fn) { SUPPRESS_FIT = true; try { fn(); } finally { setTimeout(() => { SUPPRESS_FIT = false; }, 350); } }
  let sidebarDefaulted = false;   // open the Files sidebar by default on the first session
  const tabsEl = document.getElementById('tabs');
  const sessEl = document.getElementById('sessions');

  document.getElementById('newtab').onclick = () => window.fleet.newSession();

  // ---- Chrome-style tab drag: reorder within the bar, tear off into a new window, or dock onto another window ----
  // The ORIGIN renderer owns the whole gesture (it captured the mousedown, so it keeps getting mousemove/mouseup
  // even when the cursor is over another window). Reorder is handled here; anything that LEAVES the bar is decided
  // by main on drop (it alone knows other windows' screen bounds). screen coords drive cross-window hit-testing;
  // client coords decide whether we're still inside our own bar.
  const TAB_DRAG_THRESH = 8;
  const tabbarEl = document.getElementById('tabbar');
  function inOwnBar(ev) {
    const r = tabbarEl.getBoundingClientRect();
    return ev.clientX >= r.left - 50 && ev.clientX <= r.right + 50 && ev.clientY >= r.top - 6 && ev.clientY <= r.bottom + 34;
  }
  function reorderTab(tab, clientX) {
    let before = null;
    for (const sib of tabsEl.children) {
      if (sib === tab) continue;
      const r = sib.getBoundingClientRect();
      if (clientX < r.left + r.width / 2) { before = sib; break; }
    }
    if (before) { if (tab.nextSibling !== before) tabsEl.insertBefore(tab, before); }
    else if (tab !== tabsEl.lastChild) tabsEl.appendChild(tab);
  }
  function initTabDrag(tab, sid) {
    tab.addEventListener('click', (e) => {
      if (tab._dragged) { tab._dragged = false; return; }   // swallow the click that terminates a real drag
      if (e.target.classList.contains('x')) closeTab(sid); else activate(sid);
    });
    tab.addEventListener('mousedown', (e) => {
      if (e.button !== 0 || e.target.classList.contains('x')) return;   // left-button only; × is a click, not a drag
      e.preventDefault();
      tab._dragged = false;   // fresh press; cleared so a prior drag that ended off-tab can't swallow this click
      activate(sid);
      const startX = e.screenX, startY = e.screenY;
      let dragging = false, outside = false, lastMove = 0;
      const onMove = (ev) => {
        if (!dragging) {
          if (Math.hypot(ev.screenX - startX, ev.screenY - startY) < TAB_DRAG_THRESH) return;
          dragging = true; tab._dragged = true; tab.classList.add('dragging');
        }
        if (inOwnBar(ev)) {
          if (outside) { outside = false; window.fleet.tabDragEnd(); }   // came back into the bar
          reorderTab(tab, ev.clientX);
        } else {
          if (!outside) { outside = true; const s = sessions[sid]; window.fleet.tabDragStart({ sid, title: s && s.title, color: s && s.color }); }
          const now = performance.now();
          if (now - lastMove > 16) { lastMove = now; window.fleet.tabDragMove({ screenX: ev.screenX, screenY: ev.screenY }); }
        }
      };
      const onUp = (ev) => {
        document.removeEventListener('mousemove', onMove, true);
        document.removeEventListener('mouseup', onUp, true);
        tab.classList.remove('dragging');
        if (!dragging) return;                       // never crossed threshold -> it's a click (handled above)
        if (inOwnBar(ev)) { window.fleet.tabDragEnd(); }   // dropped back in our own bar -> reorder already applied
        else { window.fleet.tabDrop({ sid, screenX: ev.screenX, screenY: ev.screenY }); }   // main migrates: dock or tear off
      };
      document.addEventListener('mousemove', onMove, true);
      document.addEventListener('mouseup', onUp, true);
    });
  }

  window.fleet.onAddSession(({ sid, title, color, panes, mode, migrated }) => {
    const sess = { title: title || 'project', color: color || '#888', mode: mode || 'dispatch', terms: {}, activePaneId: panes[0] ? panes[0].id : 0, paneCount: panes.length, paneStates: {}, forceRefresh: !!migrated };
    sessions[sid] = sess;
    const tab = document.createElement('div'); tab.className = 'tab';
    tab.innerHTML = `<span class="pdot"></span><span>${escapeHtml(sess.title)}</span><span class="x">×</span>`;
    initTabDrag(tab, sid);
    tabsEl.appendChild(tab); sess.tabEl = tab;
    const sEl = document.createElement('div'); sEl.className = 'session';
    const grid = document.createElement('div'); grid.className = 'grid';
    sEl.appendChild(grid); sessEl.appendChild(sEl); sess.sessEl = sEl; sess.gridEl = grid;
    panes.forEach((p) => buildPane(sid, sess, grid, p));
    if (!sidebarDefaulted) {       // sidebar open by default — set before layout so terminals size to the pushed width
      sidebarDefaulted = true;
      document.getElementById('filepanel').classList.add('open');
      document.getElementById('filesbtn').classList.add('on');
      sessEl.classList.add('pushed');
    }
    activate(sid); layout(sid);   // make visible first, then size + spawn at the real dimensions (activate loads the file tree)
  });

  // orchestrator spawned a new worker -> add a pane and re-flow the grid
  window.fleet.onAddPane(({ sid, pane }) => {
    const s = sessions[sid]; if (!s) return;
    s.paneCount = Math.max(s.paneCount, pane.id + 1);
    buildPane(sid, s, s.gridEl, pane);
    layout(sid);
  });

  // split n panes into rows. Columns are capped by available WIDTH so panes never get too narrow:
  // when the window is narrow, columns drop (down to 1) and panes stack VERTICALLY, each full width.
  const MIN_PANE_W = 440;   // a terminal narrower than this is cramped → use fewer columns
  function rowSplit(n, width) {
    n = Math.max(1, n);
    let cols = Math.ceil(Math.sqrt(n));                                   // ideal square-ish grid (wide window)
    if (width > 0) cols = Math.min(cols, Math.max(1, Math.floor(width / MIN_PANE_W)));   // narrow → fewer columns
    cols = Math.max(1, Math.min(cols, n));
    const rows = Math.ceil(n / cols);
    const base = Math.floor(n / rows), extra = n % rows;
    return Array.from({ length: rows }, (_, r) => base + (r < extra ? 1 : 0));   // earlier rows take the extra
  }

  // nested-flex layout: grid = vertical stack of rows; each row = horizontal strip of panes. Dividers are LOCAL —
  // a vertical divider only resizes its own row's panes; a horizontal divider only the two rows it sits between.
  function layout(sid) {
    const s = sessions[sid]; if (!s) return;
    const ids = Object.keys(s.terms).map(Number).sort((a, b) => a - b);
    const n = ids.length; if (!n) return;
    const width = s.gridEl.getBoundingClientRect().width || window.innerWidth;
    const counts = rowSplit(n, width);
    const shape = counts.join(',') + '|' + ids.join(',');
    const apply = () => {
      ids.forEach((id) => {
        const t = s.terms[id]; if (!t) return;
        try { t.fit.fit(); if (t.started) t.term.refresh(0, t.term.rows - 1); } catch (_) {}   // refresh clears reflow striping
        if (!t.started) { window.fleet.termReady({ sid, id, cols: t.term.cols, rows: t.term.rows }); t.started = true; }
        else window.fleet.termResize({ sid, id, cols: t.term.cols, rows: t.term.rows });
      });
    };
    // rAF gives the crisp foreground fit; the setTimeout is a fallback because rAF is PAUSED when the window is
    // backgrounded — without it, a worker pane's PTY (spawned on term-ready) would never start until you return.
    const refit = () => {
      requestAnimationFrame(apply); setTimeout(apply, 80);
      // a migrated session re-attaches fresh xterms to already-running PTYs; their replayed buffer reflows but the
      // normal apply only refreshes panes that were ALREADY started, so the destination renders striped until a
      // keystroke. Force a full refresh on every started pane once the fit + streamed buffer have settled.
      if (s.forceRefresh) { s.forceRefresh = false; setTimeout(() => { ids.forEach((id) => { const t = s.terms[id]; if (t && t.started) { try { t.term.refresh(0, t.term.rows - 1); } catch (_) {} } }); }, 120); }
    };
    if (s.shape === shape) { refit(); return; }   // structure unchanged (minor resize) — just refit, skip the rebuild
    s.shape = shape; s.rowFr = counts.map(() => 1); s.colFr = counts.map((c) => Array(c).fill(1));
    ids.forEach((id) => { const pe = s.terms[id].paneEl; if (pe && pe.parentNode) pe.parentNode.removeChild(pe); });
    s.gridEl.innerHTML = '';
    s.rowEls = []; s.rowPanes = [];
    let k = 0;
    counts.forEach((cnt, r) => {
      if (r > 0) s.gridEl.appendChild(makeGutter(s, 'h', r, 0));
      const row = document.createElement('div'); row.className = 'row';
      row.style.flexGrow = s.rowFr[r]; row.style.flexBasis = '0';
      s.rowEls[r] = row; s.rowPanes[r] = [];
      for (let c = 0; c < cnt; c++) {
        if (c > 0) row.appendChild(makeGutter(s, 'v', r, c));
        const pe = s.terms[ids[k++]].paneEl;
        pe.style.flexGrow = s.colFr[r][c]; pe.style.flexBasis = '0'; pe.style.flexShrink = '1';
        row.appendChild(pe); s.rowPanes[r].push(pe);
      }
      s.gridEl.appendChild(row);
    });
    refit();
  }

  function makeGutter(s, axis, r, c) {
    const g = document.createElement('div');
    g.className = axis === 'h' ? 'hgutter' : 'vgutter';
    g.addEventListener('mousedown', (e) => startDrag(e, s, axis, r, c));
    return g;
  }

  // drag a divider: vertical adjusts the two adjacent panes' grow within row r; horizontal adjusts rows r-1/r grow
  function startDrag(e, s, axis, r, c) {
    e.preventDefault();
    if (axis === 'v') {
      const fr = s.colFr[r], rowW = s.rowEls[r].getBoundingClientRect().width || 1, sum = fr.reduce((x, y) => x + y, 0);
      const x0 = e.clientX, a0 = fr[c - 1], b0 = fr[c];
      const mv = (ev) => { const d = (ev.clientX - x0) / rowW * sum; fr[c - 1] = Math.max(0.1, a0 + d); fr[c] = Math.max(0.1, b0 - d); s.rowPanes[r].forEach((pe, i) => pe.style.flexGrow = fr[i]); };
      endDrag(mv, 'col-resize');
    } else {

    results.forEach((r) => {

          if (open && !loaded) { loaded = true; await renderDir(e.path, kids); }
        };
      } else item.onclick = () => openFile(e.path, item);
    });
  }

  const LANG = { js:'javascript', mjs:'javascript', cjs:'javascript', jsx:'javascript', ts:'typescript', tsx:'typescript', json:'json', html:'html', htm:'html', css:'css', scss:'scss', less:'less', md:'markdown', py:'python', sh:'shell', bash:'shell', zsh:'shell', yml:'yaml', yaml:'yaml', xml:'xml', svg:'xml', java:'java', kt:'kotlin', rs:'rust', go:'go', c:'c', h:'c', cpp:'cpp', cc:'cpp', rb:'ruby', php:'php', sql:'sql', toml:'ini', ini:'ini', env:'ini', gradle:'groovy' };
  function langFor(file) { return LANG[(file.split('.').pop() || '').toLowerCase()] || 'plaintext'; }

  async function openFile(file, itemEl, line) {
    const res = await window.fleet.fsRead(activeSid, file);
    if (!res || res.error) { window.alert((res && res.error) || 'cannot open file'); return; }
    if (lastSel) lastSel.classList.remove('sel'); if (itemEl) { itemEl.classList.add('sel'); lastSel = itemEl; }
    ensureMonaco(() => {
      fmFile = file;
      const old = mEditor.getModel(); const model = monaco.editor.createModel(res.content, langFor(file));
      mEditor.setModel(model); if (old) old.dispose();
      withNoFit(() => { edPanel.classList.add('open'); sessEl.classList.add('editing'); edSplit.classList.add('show'); });  // editor docks by the sidebar; terminals clip, no reflow
      setDirty(false); mEditor.layout();
      if (line) { try { mEditor.revealLineInCenter(line); mEditor.setPosition({ lineNumber: line, column: 1 }); } catch (_) {} }   // jump to a search hit
      mEditor.focus();
    });
  }
  function setDirty(d) { edSave.disabled = !d; edPath.textContent = (d ? '● ' : '') + (fmFile ? fmFile.split('/').slice(-2).join('/') : ''); }
  async function saveFile() {
    if (!fmFile || !mEditor || !mEditor.getModel()) return;   // never write an empty body from a closed/modelless editor
    const res = await window.fleet.fsWrite(activeSid, fmFile, mEditor.getValue());
    if (res && res.ok) setDirty(false); else window.alert((res && res.error) || 'save failed');
  }

  function ensureMonaco(cb) {
    if (mEditor) return cb();
    if (monacoLoading) { setTimeout(() => ensureMonaco(cb), 120); return; }
    monacoLoading = true;
    require.config({ paths: { vs: new URL('vendor/monaco/vs', location.href).href } });
    require(['vs/editor/editor.main'], () => {
      monaco = window.monaco;
      mEditor = monaco.editor.create(document.getElementById('monaco'), { theme: 'vs-dark', automaticLayout: true, fontSize: 13, minimap: { enabled: false }, fontFamily: 'SF Mono, Menlo, monospace', scrollBeyondLastLine: false });
      mEditor.onDidChangeModelContent(() => setDirty(true));
      mEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);
      monacoLoading = false; cb();
    });
  }
</script>
